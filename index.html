<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mostrabot — Mobile Only</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --up-color: #3A8FE8; --down-color: #E8773A; --left-color: #9B59B6; --right-color: #27AE60;
      --bg: #FFF8F0; --card: #FFFFFF; --text: #1A1A2E; --radius: 18px;
    }

    body, html { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; overflow: hidden; }

    /* BLOQUEIO PARA DESKTOP */
    #pc-blocker {
      position: fixed; inset: 0; background: #1a1a2e; color: white;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999; text-align: center; padding: 20px;
    }
    #app-content { display: none; height: 100%; flex-direction: column; }

    @media (max-width: 1024px) {
      #pc-blocker { display: none; }
      #app-content { display: flex; }
    }

    /* INTERFACE */
    .app-header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
    .brand { font-family: 'Fredoka One', cursive; color: var(--up-color); font-size: 20px; }
    .app-main { flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: space-around; }

    .grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; background: white; padding: 8px;
      border-radius: var(--radius); border: 2px solid #ddd; width: 100%; max-width: 400px; aspect-ratio: 1/1; margin: 0 auto;
    }
    .cell {
      background: #f9f9f9; border: 1px solid #eee; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; font-size: 14px;
    }
    .cell.robot { background: #EEF6FF; border: 2px solid var(--up-color); font-size: 24px; }
    .cell.target { background: #FFF9D6; border: 2px solid #F5C842; }

    /* BOTÕES COM SETAS */
    .controls { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; margin: 0 auto; }
    .cmd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .btn {
      border: none; border-radius: 15px; padding: 12px; color: white;
      font-family: 'Fredoka One', cursive; font-size: 14px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }
    .btn span { font-size: 20px; margin-bottom: 2px; }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    
    .up { background: var(--up-color); grid-column: 2; }
    .left { background: var(--left-color); grid-column: 1; }
    .down { background: var(--down-color); grid-column: 2; }
    .right { background: var(--right-color); grid-column: 3; }

    .exec-btn { background: #27AE60; padding: 15px; font-size: 18px; box-shadow: 0 6px 0 #1A7A42; margin-top: 5px; }
    .status { background: #eee; padding: 8px; border-radius: 10px; text-align: center; font-weight: 900; font-size: 14px; }
  </style>
</head>
<body>

  <div id="pc-blocker">
    <div style="font-size: 60px;">🚫</div>
    <h1>Acesso Negado</h1>
    <p>O <b>Mostrabot</b> só funciona em <b>Celulares e Tablets</b>.</p>
  </div>

  <div id="app-content">
    <header class="app-header">
      <div class="brand">🤖 Mostrabot</div>
      <div id="step-info" style="font-weight:900; color:#777">Passo: —</div>
    </header>

    <main class="app-main">
      <div style="display:flex; justify-content: space-between; align-items:center;">
        <div style="font-weight:900">🎯 Alvo: <span id="target-txt" style="color:var(--up-color)">?</span></div>
        <button onclick="setRandomTarget()" style="padding:5px 10px; border-radius:8px; border:1px solid #ccc; background:#fff; font-weight:bold">🎲 Sortear</button>
      </div>

      <div class="grid" id="grid"></div>
      <div class="status" id="status-bar">Programe os movimentos!</div>

      <div class="controls">
        <div class="cmd-grid">
          <button class="btn up" onclick="addCmd('up')"><span>↑</span>FRENTE</button>
          <button class="btn left" onclick="addCmd('left')"><span>←</span>ESQ</button>
          <button class="btn down" onclick="addCmd('down')"><span>↓</span>TRÁS</button>
          <button class="btn right" onclick="addCmd('right')"><span>→</span>DIR</button>
        </div>
        <button class="btn exec-btn" id="btn-exec" onclick="run()">▶ EXECUTAR</button>
        <button onclick="resetAll()" style="background:none; border:none; color:#777; font-weight:bold; text-decoration:underline; margin-top:5px">Reiniciar</button>
      </div>
    </main>
  </div>

  <!-- SONS -->
  <audio id="snd-move" src="move.mp3"></audio>
  <audio id="snd-win" src="win.mp3"></audio>
  <audio id="snd-error" src="error.mp3"></audio>

<script>
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
  let robot = { r: 0, c: 0 }, target = null, cmds = [], running = false;

  // Toca som com segurança
  function playSound(id) {
    const s = document.getElementById(id);
    if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
  }

  function buildGrid() {
    const g = document.getElementById('grid');
    g.innerHTML = '';
    CHARS.forEach((ch, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `c-${Math.floor(i/6)}-${i%6}`;
      cell.textContent = ch;
      cell.onclick = () => { if(!running) setTarget(Math.floor(i/6), i%6); };
      g.appendChild(cell);
    });
    render();
  }

  function setTarget(r, c) {
    target = { r, c };
    document.getElementById('target-txt').textContent = CHARS[r*6+c];
    render();
  }

  function setRandomTarget() {
    setTarget(Math.floor(Math.random()*6), Math.floor(Math.random()*6));
  }

  function addCmd(d) { 
    if(!running && cmds.length < 20) { 
      cmds.push(d); 
      document.getElementById('status-bar').textContent = `Comandos: ${cmds.length}`;
    } 
  }

  function render() {
    document.querySelectorAll('.cell').forEach((el, i) => {
      const r = Math.floor(i/6), c = i%6;
      el.className = 'cell';
      if(r === robot.r && c === robot.c) {
        el.classList.add('robot'); el.textContent = '🤖';
      } else {
        if(target && r === target.r && c === target.c) el.classList.add('target');
        el.textContent = CHARS[i];
      }
    });
  }

  async function run() {
    if(running || !target || !cmds.length) return;
    running = true;
    const btn = document.getElementById('btn-exec');
    btn.style.opacity = '0.5';

    const queue = [...cmds];
    cmds = [];

    for(let i=0; i<queue.length; i++) {
      document.getElementById('step-info').textContent = `Passo: ${i+1}`;
      const move = { up: [-1,0], down: [1,0], left: [0,-1], right: [0,1] }[queue[i]];
      let nR = robot.r + move[0], nC = robot.c + move[1];

      if(nR < 0 || nR > 5 || nC < 0 || nC > 5) {
        setStatus("💥 Bateu!", "#ff0000");
        playSound('snd-error');
        break;
      }
      
      robot.r = nR; robot.c = nC;
      playSound('snd-move');
      render();
      await new Promise(r => setTimeout(r, 500));
    }

    if(robot.r === target.r && robot.c === target.c) {
      setStatus("🎉 CONSEGUI!", "#27AE60");
      playSound('snd-win');
    } else {
      setStatus("❌ Tente de novo", "#E8773A");
    }
    
    running = false;
    btn.style.opacity = '1';
  }

  function setStatus(t, c) {
    const s = document.getElementById('status-bar');
    s.textContent = t; s.style.color = c;
  }

  function resetAll() {
    robot = {r:0, c:0}; target = null; cmds = [];
    document.getElementById('target-txt').textContent = '?';
    document.getElementById('step-info').textContent = 'Passo: —';
    setStatus("Programe os movimentos!", "#000");
    render();
  }

  window.onload = buildGrid;
</script>
</body>
</html>
