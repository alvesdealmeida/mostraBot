<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Mostrabot — Primeiros Passos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --up-color:    #3A8FE8;
      --up-light:    #D6EAFC;
      --up-dark:     #1A5FAD;
      --down-color:  #E8773A;
      --down-light:  #FCE8D6;
      --down-dark:   #AD4E1A;
      --left-color:  #9B59B6;
      --left-light:  #EDD9FA;
      --left-dark:   #6B2D8A;
      --right-color: #27AE60;
      --right-light: #D5F5E3;
      --right-dark:  #1A7A42;
      --target-color: #F5C842;
      --target-glow:  rgba(245,200,66,0.4);
      --robot-color:  #3A8FE8;
      --success-color:#27AE60;
      --error-color:  #E84040;
      --bg:            #FFF8F0;
      --card:          #FFFFFF;
      --border:        #E8E0D8;
      --text:          #1A1A2E;
      --muted:         #7A7A8A;
      --grid-cell:     #FFFFFF;
      --grid-border:   #D8D0C8;
      --radius:        14px;
      --shadow:        0 3px 14px rgba(0,0,0,0.09);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(58,143,232,0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(39,174,96,0.08) 0%, transparent 40%);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    .app-header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-robot { font-size: 28px; line-height: 1; }
    .brand-text  { line-height: 1.1; }

    .brand-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(16px, 4vw, 22px);
      color: var(--robot-color);
    }

    .brand-sub {
      font-size: clamp(9px, 2vw, 11px);
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-step {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(13px, 3vw, 16px);
      color: var(--muted);
      text-align: right;
    }

    .header-step b { color: var(--robot-color); }

    /* ── MAIN LAYOUT ── */
    .app-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (min-width: 700px) {
      .app-main {
        flex-direction: row;
        align-items: flex-start;
        padding: 16px;
        gap: 16px;
      }
    }

    /* ── GRID SECTION ── */
    .grid-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    @media (min-width: 700px) {
      .grid-section { width: clamp(280px, 48%, 460px); }
    }

    /* ── GRID ── */
    .grid-wrap { position: relative; width: 100%; display: flex; justify-content: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: clamp(3px, 1vw, 6px);
      background: var(--card);
      border-radius: var(--radius);
      padding: clamp(6px, 2vw, 12px);
      box-shadow: var(--shadow);
      border: 2px solid var(--border);
      width: 100%;
      max-width: 460px;
    }

    .cell {
      width:  clamp(36px, calc((min(96vw, 460px) - 36px) / 6), 72px);
      height: clamp(36px, calc((min(96vw, 460px) - 36px) / 6), 72px);
      border-radius: 10px;
      background: var(--grid-cell);
      border: 2px solid var(--grid-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(13px, 3.5vw, 24px);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
      user-select: none;
      touch-action: manipulation;
    }

    .cell.target-cell {
      background: #FFF9D6;
      border-color: var(--target-color);
      border-width: 3px;
      animation: pulse-target 1.8s ease-in-out infinite;
    }

    @keyframes pulse-target {
      0%, 100% { box-shadow: 0 0 0 3px rgba(245,200,66,0.4); }
      50% { box-shadow: 0 0 0 7px rgba(245,200,66,0.1); }
    }

    .cell.robot-cell {
      background: #EEF6FF;
      border-color: var(--robot-color);
      border-width: 3px;
    }

    .cell.robot-on-target {
      background: #FFFDE6;
      border-color: var(--target-color);
      animation: pulse-win 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse-win {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    /* ── TARGET BADGE ── */
    .target-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 2px solid var(--target-color);
      border-radius: 14px;
      padding: 8px 16px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .target-val { font-family: 'Fredoka One', cursive; font-size: 28px; color: #7a5c00; }

    .btn-random {
      background: var(--target-color);
      border: none;
      border-radius: 10px;
      padding: 6px 14px;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      box-shadow: 0 3px 0 #c89a00;
    }

    /* ── CONTROLS ── */
    .controls-section { flex: 1; display: flex; flex-direction: column; gap: 12px; width: 100%; }

    .panel {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid var(--border);
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .cmd-btn {
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-family: 'Fredoka One', cursive;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2);
    }

    .cmd-btn.up    { background: var(--up-color); grid-column: 1 / -1; }
    .cmd-btn.down  { background: var(--down-color); grid-column: 1 / -1; }
    .cmd-btn.left  { background: var(--left-color); }
    .cmd-btn.right { background: var(--right-color); }

    .queue-area {
      min-height: 64px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      background: #F7F4F0;
      border-radius: 10px;
      padding: 8px;
      border: 1.5px dashed var(--border);
    }

    .q-chip {
      width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 900;
    }

    .btn-exec {
      width: 100%; padding: 16px; border: none; border-radius: 14px;
      background: var(--success-color); color: #fff;
      font-family: 'Fredoka One', cursive; font-size: 20px;
      box-shadow: 0 6px 0 #1A7A42; cursor: pointer;
    }

    .status-bar {
      border-radius: 12px; padding: 10px;
      font-family: 'Fredoka One', cursive; text-align: center;
      background: #F4F4F4; border: 2px solid var(--border);
    }

    .hidden { display: none; }
    
    /* Confetes */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
    .confetti-piece { position: absolute; width: 10px; height: 14px; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <span class="brand-robot">🤖</span>
    <div class="brand-text">
      <div class="brand-title">Mostrabot</div>
      <div class="brand-sub">Kit EJR · Primeiros Passos</div>
    </div>
  </div>
  <div class="header-step" id="step-display">Passo <b id="step-num">—</b></div>
</header>

<div class="confetti-wrap" id="confetti-wrap"></div>

<main class="app-main">
  <section class="grid-section">
    <div class="target-display">
      <span class="target-label">🎯 Destino:</span>
      <span class="target-val" id="target-letter">?</span>
      <button class="btn-random" id="btn-random" onclick="setRandomTarget()">🎲 Sortear</button>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <section class="controls-section">
    <div class="status-bar" id="status-bar">Escolha o destino e programe o Mostrabot! 🚀</div>

    <div class="panel">
      <div class="cmd-grid">
        <button class="cmd-btn up" onclick="addCmd('up')">⬆️ Para Frente</button>
        <button class="cmd-btn left" onclick="addCmd('left')">⬅️ Esquerda</button>
        <button class="cmd-btn right" onclick="addCmd('right')">➡️ Direita</button>
        <button class="cmd-btn down" onclick="addCmd('down')">⬇️ Para Trás</button>
      </div>
    </div>

    <div class="panel">
      <div class="queue-area" id="queue">
        <div id="queue-empty">Adicione blocos aqui!</div>
      </div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button onclick="undoCmd()" style="flex:1; padding:8px; border-radius:8px; border:none; background:#eee;">↩ Desfazer</button>
        <button onclick="clearCmds()" style="flex:1; padding:8px; border-radius:8px; border:none; background:#ffe8e8; color:red;">🗑 Limpar</button>
      </div>
    </div>

    <button class="btn-exec" id="btn-exec" onclick="executeCommands()">▶ Executar Programa</button>
    <button onclick="resetAll()" style="width:100%; padding:10px; background:none; border:none; color:#777; font-weight:bold; cursor:pointer;">🔄 Reiniciar Robô</button>
  </section>
</main>

<!-- Áudios (Opcional: Substitua os URLs por arquivos reais se desejar) -->
<audio id="sound-success" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>

<script>
const COLS = 6, ROWS = 6;
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
const DIRS = {
  up:    { dr: -1, dc:  0, arrow: '⬆', label: 'Para Frente' },
  down:  { dr:  1, dc:  0, arrow: '⬇', label: 'Para Trás'   },
  left:  { dr:  0, dc: -1, arrow: '⬅', label: 'Esquerda'    },
  right: { dr:  0, dc:  1, arrow: '➡', label: 'Direita'     },
};

let robot = { row: 0, col: 0 };
let target = null;
let commands = [];
let executing = false;

function init() {
  buildGrid();
  renderAll();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS);
    const col = idx % COLS;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${row}-${col}`;
    cell.addEventListener('click', () => onCellClick(row, col));
    grid.appendChild(cell);
  });
}

function renderAll() {
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS);
    const col = idx % COLS;
    const cell = document.getElementById(`cell-${row}-${col}`);
    const isRobot = robot.row === row && robot.col === col;
    const isTgt = target && target.row === row && target.col === col;

    cell.className = 'cell';
    if (isRobot && isTgt) cell.classList.add('robot-on-target');
    else if (isRobot) cell.classList.add('robot-cell');
    else if (isTgt) cell.classList.add('target-cell');

    cell.textContent = isRobot ? '🤖' : ch;
  });
}

function onCellClick(row, col) {
  if (executing) return;
  target = { row, col };
  document.getElementById('target-letter').textContent = CHARS[row * COLS + col];
  renderAll();
}

function setRandomTarget() {
  let r, c;
  do {
    r = Math.floor(Math.random() * ROWS);
    c = Math.floor(Math.random() * COLS);
  } while (r === robot.row && c === robot.col);
  onCellClick(r, c);
}

function addCmd(dir) {
  if (executing) return;
  commands.push(dir);
  updateQueueUI();
}

function updateQueueUI() {
  const qArea = document.getElementById('queue');
  const empty = document.getElementById('queue-empty');
  qArea.querySelectorAll('.q-chip').forEach(n => n.remove());
  
  if (commands.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    commands.forEach(cmd => {
      const chip = document.createElement('div');
      chip.className = `q-chip`;
      chip.style.backgroundColor = `var(--${cmd}-color)`;
      chip.textContent = DIRS[cmd].arrow;
      qArea.appendChild(chip);
    });
  }
}

function undoCmd() { if (!executing) { commands.pop(); updateQueueUI(); } }
function clearCmds() { if (!executing) { commands = []; updateQueueUI(); } }

function playSound(id) {
  const s = document.getElementById(id);
  if (s) { s.currentTime = 0; s.play().catch(() => {}); }
}

async function executeCommands() {
  if (executing || commands.length === 0 || !target) return;
  executing = true;
  const statusBar = document.getElementById('status-bar');
  
  let startPos = { ...robot };

  for (let i = 0; i < commands.length; i++) {
    const cmd = commands[i];
    const nR = robot.row + DIRS[cmd].dr;
    const nC = robot.col + DIRS[cmd].dc;

    if (nR < 0 || nR >= ROWS || nC < 0 || nC >= COLS) {
      playSound('sound-error');
      statusBar.textContent = "💥 Bateu na parede! Tente outro caminho.";
      statusBar.style.color = "red";
      executing = false;
      return;
    }

    robot.row = nR;
    robot.col = nC;
    document.getElementById('step-num').textContent = i + 1;
    renderAll();
    await new Promise(r => setTimeout(r, 600));
  }

  // --- FINAL DA EXECUÇÃO ---
  if (robot.row === target.row && robot.col === target.col) {
    playSound('sound-success');
    statusBar.textContent = '🎉 Você conseguiu! O Mostrabot chegou!';
    statusBar.style.color = "green";
    launchConfetti();
  } else {
    playSound('sound-error');
    statusBar.textContent = '🤔 Quase lá! O robô parou no lugar errado.';
    statusBar.style.color = "orange";
  }
  executing = false;
}

function launchConfetti() {
  const container = document.getElementById('confetti-wrap');
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.backgroundColor = ['#ff0','#f0f','#0ff','#0f0'][Math.floor(Math.random()*4)];
    p.style.animationDuration = (Math.random() * 2 + 1) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

function resetAll() {
  if (executing) return;
  robot = { row: 0, col: 0 };
  commands = [];
  target = null;
  document.getElementById('target-letter').textContent = '?';
  document.getElementById('status-bar').textContent = "Robô reiniciado!";
  document.getElementById('status-bar').style.color = "";
  updateQueueUI();
  renderAll();
}

init();
</script>
</body>
</html>
