<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mostrabot — Primeiros Passos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --up-color:    #3A8FE8;
      --up-dark:     #1A5FAD;
      --down-color:  #E8773A;
      --down-dark:   #AD4E1A;
      --left-color:  #9B59B6;
      --left-dark:   #6B2D8A;
      --right-color: #27AE60;
      --right-dark:  #1A7A42;
      --target-color: #F5C842;
      --robot-color:  #3A8FE8;
      --success-color:#27AE60;
      --error-color:  #E84040;
      --bg:           #FFF8F0;
      --card:         #FFFFFF;
      --border:       #E8E0D8;
      --text:         #1A1A2E;
      --muted:        #7A7A8A;
      --radius:       18px;
      --shadow:       0 4px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f0f0f0; /* Cor de fundo fora do "celular" */
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Restrição para Desktop - Simula um Celular */
    .app-container {
      width: 100%;
      max-width: 500px; /* Largura máxima de um smartphone grande */
      background: var(--bg);
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .app-header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand-title { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--robot-color); }
    .header-step { font-family: 'Fredoka One', cursive; font-size: 14px; color: var(--muted); }

    .app-main {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    /* Grid responsiva que cabe na tela */
    .grid-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      background: var(--card);
      padding: 8px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      width: 100%;
      aspect-ratio: 1 / 1;
    }

    .cell {
      background: #fff;
      border: 1.5px solid #eee;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      transition: 0.1s;
    }

    .cell.target-cell { background: #FFF9D6; border-color: var(--target-color); color: #7a5c00; }
    .cell.robot-cell { background: #EEF6FF; border-color: var(--robot-color); font-size: 22px; }
    .cell.robot-on-target { background: #E8FBF0; border-color: var(--success-color); font-size: 22px; animation: bounce 0.5s infinite alternate; }

    @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

    /* Controles otimizados para polegar */
    .controls-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .cmd-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cmd-btn {
      border: none;
      border-radius: 14px;
      padding: 14px 5px;
      font-family: 'Fredoka One', cursive;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }

    .cmd-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    
    .up { background: var(--up-color); grid-column: 2; }
    .left { background: var(--left-color); grid-column: 1; grid-row: 2; }
    .right { background: var(--right-color); grid-column: 3; grid-row: 2; }
    .down { background: var(--down-color); grid-column: 2; grid-row: 2; }

    .queue-box {
      background: #fff;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      min-height: 50px;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .q-chip {
      width: 30px; height: 30px;
      border-radius: 6px;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 12px;
    }

    .status-bar {
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      background: #eee;
    }

    .btn-main {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      border: none;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: white;
      background: var(--success-color);
      box-shadow: 0 6px 0 #1A7A42;
      margin-top: 5px;
    }

    .secondary-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 5px;
    }

    .btn-sec {
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
    }

    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
  </style>
</head>
<body>

<div class="app-container">
  <header class="app-header">
    <div class="brand-title">🤖 Mostrabot</div>
    <div class="header-step">Passo <b id="step-num">—</b></div>
  </header>

  <main class="app-main">
    <section class="grid-container">
      <div style="display:flex; justify-content: space-between; width: 100%; align-items: center;">
        <span style="font-weight: 800;">🎯 Destino: <span id="target-letter" style="color:var(--up-color)">?</span></span>
        <button class="btn-sec" onclick="setRandomTarget()">🎲 Sortear</button>
      </div>
      
      <div class="grid" id="grid"></div>
    </section>

    <div class="status-bar" id="status-bar">Programe o caminho!</div>

    <section class="controls-area">
      <div class="queue-box" id="queue"><small style="color:#aaa">Sequência vazia...</small></div>
      
      <div class="cmd-grid">
        <button class="cmd-btn up" onclick="addCmd('up')">FRENTE</button>
        <button class="cmd-btn left" onclick="addCmd('left')">ESQ</button>
        <button class="cmd-btn down" onclick="addCmd('down')">TRÁS</button>
        <button class="cmd-btn right" onclick="addCmd('right')">DIR</button>
      </div>

      <button class="btn-main" id="btn-exec" onclick="executeCommands()">INICIAR MOVIMENTO</button>
      
      <div class="secondary-btns">
        <button class="btn-sec" onclick="undoCmd()">↩ Desfazer</button>
        <button class="btn-sec" onclick="resetAll()">🔄 Reiniciar</button>
      </div>
    </section>
  </main>
</div>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, dur) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const sounds = {
  step: () => playTone(400, 'square', 0.1),
  success: () => { playTone(523, 'sine', 0.2); setTimeout(()=>playTone(659,'sine',0.2),150); },
  error: () => playTone(150, 'sawtooth', 0.4)
};

// --- LÓGICA ---
const COLS = 6;
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
const DIRS = {
  up: { dr: -1, dc: 0, color: '#3A8FE8' },
  down: { dr: 1, dc: 0, color: '#E8773A' },
  left: { dr: 0, dc: -1, color: '#9B59B6' },
  right: { dr: 0, dc: 1, color: '#27AE60' }
};

let robot = { row: 0, col: 0 };
let target = null;
let commands = [];
let executing = false;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CHARS.forEach((ch, idx) => {
    const r = Math.floor(idx / COLS), c = idx % COLS;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${r}-${c}`;
    cell.textContent = ch;
    cell.onclick = () => setTarget(r, c);
    grid.appendChild(cell);
  });
}

function setTarget(r, c) {
  if (executing) return;
  target = { r, c };
  document.getElementById('target-letter').textContent = CHARS[r * COLS + c];
  render();
}

function setRandomTarget() {
  let r, c;
  do { r = Math.floor(Math.random()*6); c = Math.floor(Math.random()*6); }
  while(r === robot.row && c === robot.col);
  setTarget(r, c);
}

function addCmd(dir) {
  if (executing || commands.length >= 20) return;
  commands.push(dir);
  render();
}

function undoCmd() { commands.pop(); render(); }

function render() {
  document.querySelectorAll('.cell').forEach((el, idx) => {
    const r = Math.floor(idx/6), c = idx%6;
    el.className = 'cell';
    if(r === robot.row && c === robot.col) {
      el.classList.add(target && r===target.r && c===target.c ? 'robot-on-target' : 'robot-cell');
      el.textContent = '🤖';
    } else {
      if(target && r===target.r && c===target.c) el.classList.add('target-cell');
      el.textContent = CHARS[idx];
    }
  });

  const qArea = document.getElementById('queue');
  qArea.innerHTML = commands.length ? '' : '<small style="color:#aaa">Sequência vazia...</small>';
  commands.forEach(cmd => {
    const chip = document.createElement('div');
    chip.className = 'q-chip';
    chip.style.backgroundColor = DIRS[cmd].color;
    chip.textContent = cmd[0].toUpperCase();
    qArea.appendChild(chip);
  });
}

async function executeCommands() {
  if (executing || !target || !commands.length) return;
  executing = true;
  const btn = document.getElementById('btn-exec');
  btn.disabled = true;
  btn.style.opacity = "0.5";

  for (let i = 0; i < commands.length; i++) {
    document.getElementById('step-num').textContent = i + 1;
    const d = DIRS[commands[i]];
    const nR = robot.row + d.dr, nC = robot.col + d.dc;

    await new Promise(r => setTimeout(r, 450));

    if (nR < 0 || nR >= 6 || nC < 0 || nC >= 6) {
      sounds.error();
      setStatus('💥 Bateu na borda!', '#ffe8e8');
      break;
    }

    robot.row = nR; robot.col = nC;
    sounds.step();
    render();
  }

  if (robot.row === target.r && robot.col === target.c) {
    sounds.success();
    setStatus('🎉 PARABÉNS!', '#e8fbf0');
  } else {
    sounds.error();
    setStatus('❌ Não chegou lá!', '#ffe8e8');
  }
  
  executing = false;
  btn.disabled = false;
  btn.style.opacity = "1";
}

function setStatus(txt, bg) {
  const s = document.getElementById('status-bar');
  s.textContent = txt;
  s.style.background = bg;
}

function resetAll() {
  robot = {row:0, col:0}; target = null; commands = [];
  document.getElementById('target-letter').textContent = '?';
  document.getElementById('step-num').textContent = '—';
  setStatus('Programe o caminho!', '#eee');
  render();
}

buildGrid();
render();
</script>
</body>
</html>
