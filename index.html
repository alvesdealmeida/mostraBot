<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Mostrabot — Primeiros Passos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --up-color:    #3A8FE8;
      --up-light:    #D6EAFC;
      --up-dark:     #1A5FAD;
      --down-color:  #E8773A;
      --down-light:  #FCE8D6;
      --down-dark:   #AD4E1A;
      --left-color:  #9B59B6;
      --left-light:  #EDD9FA;
      --left-dark:   #6B2D8A;
      --right-color: #27AE60;
      --right-light: #D5F5E3;
      --right-dark:  #1A7A42;
      --target-color: #F5C842;
      --target-glow:  rgba(245,200,66,0.4);
      --robot-color:  #3A8FE8;
      --success-color:#27AE60;
      --error-color:  #E84040;
      --bg:           #FFF8F0;
      --card:         #FFFFFF;
      --border:       #E8E0D8;
      --text:         #1A1A2E;
      --muted:        #7A7A8A;
      --grid-cell:    #FFFFFF;
      --grid-border:  #D8D0C8;
      --radius:       14px;
      --shadow:       0 3px 14px rgba(0,0,0,0.09);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 10% 10%, rgba(58,143,232,0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(39,174,96,0.08) 0%, transparent 40%);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .app-header {
      background: var(--card);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .header-brand { display: flex; align-items: center; gap: 8px; }
    .brand-robot { font-size: 28px; line-height: 1; }
    .brand-text  { line-height: 1.1; }
    .brand-title { font-family: 'Fredoka One', cursive; font-size: clamp(16px, 4vw, 22px); color: var(--robot-color); }
    .brand-sub { font-size: clamp(9px, 2vw, 11px); color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .header-step { font-family: 'Fredoka One', cursive; font-size: clamp(13px, 3vw, 16px); color: var(--muted); text-align: right; }
    .header-step b { color: var(--robot-color); }

    .app-main { display: flex; flex-direction: column; gap: 12px; padding: 12px; max-width: 1100px; margin: 0 auto; }
    @media (min-width: 700px) { .app-main { flex-direction: row; align-items: flex-start; padding: 16px; gap: 16px; } }

    .grid-section { flex: 0 0 auto; display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%; }
    @media (min-width: 700px) { .grid-section { width: clamp(280px, 48%, 460px); } }

    .grid-wrap { position: relative; width: 100%; display: flex; justify-content: center; }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: clamp(3px, 1vw, 6px); background: var(--card); border-radius: var(--radius); padding: clamp(6px, 2vw, 12px); box-shadow: var(--shadow); border: 2px solid var(--border); width: 100%; max-width: 460px; }

    .cell {
      width:  clamp(36px, calc((min(96vw, 460px) - 36px) / 6), 72px);
      height: clamp(36px, calc((min(96vw, 460px) - 36px) / 6), 72px);
      border-radius: 10px;
      background: var(--grid-cell);
      border: 2px solid var(--grid-border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka One', cursive; font-size: clamp(13px, 3.5vw, 24px); color: var(--text);
      cursor: pointer; transition: transform 0.15s, background 0.2s; touch-action: manipulation;
    }

    .cell.target-cell { background: #FFF9D6; border-color: var(--target-color); border-width: 3px; animation: pulse-target 1.8s infinite; color: #7a5c00; }
    .cell.robot-cell { background: #EEF6FF; border-color: var(--robot-color); border-width: 3px; font-size: clamp(18px, 5vw, 32px); }
    .cell.robot-on-target { background: #FFFDE6; border-color: var(--target-color); border-width: 3px; animation: pulse-win 0.6s infinite alternate; font-size: clamp(18px, 5vw, 32px); }

    @keyframes pulse-target { 0%, 100% { box-shadow: 0 0 0 3px rgba(245,200,66,0.4); } 50% { box-shadow: 0 0 0 7px rgba(245,200,66,0.1); } }
    @keyframes pulse-win { from { transform: scale(1); } to { transform: scale(1.08); } }

    .target-display { display: flex; align-items: center; gap: 8px; background: var(--card); border: 2px solid var(--target-color); border-radius: 14px; padding: 8px 16px; font-family: 'Fredoka One', cursive; width: 100%; justify-content: center; flex-wrap: wrap; }
    .target-val { font-size: 28px; color: #7a5c00; }

    .btn-random { background: var(--target-color); border: none; border-radius: 10px; padding: 6px 14px; font-family: 'Fredoka One', cursive; cursor: pointer; box-shadow: 0 3px 0 #c89a00; }
    .btn-random:active { transform: translateY(2px); box-shadow: 0 1px 0 #c89a00; }

    .controls-section { flex: 1; display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .panel { background: var(--card); border-radius: var(--radius); border: 2px solid var(--border); padding: 12px; box-shadow: var(--shadow); }
    .panel-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: var(--muted); margin-bottom: 10px; }

    .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .cmd-btn { border: none; border-radius: 14px; padding: 12px; font-family: 'Fredoka One', cursive; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .cmd-btn.up { background: var(--up-color); box-shadow: 0 5px 0 var(--up-dark); grid-column: 1 / -1; }
    .cmd-btn.down { background: var(--down-color); box-shadow: 0 5px 0 var(--down-dark); grid-column: 1 / -1; }
    .cmd-btn.left { background: var(--left-color); box-shadow: 0 5px 0 var(--left-dark); }
    .cmd-btn.right { background: var(--right-color); box-shadow: 0 5px 0 var(--right-dark); }
    .cmd-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 transparent; }

    .queue-area { min-height: 64px; display: flex; flex-wrap: wrap; gap: 5px; background: #F7F4F0; border-radius: 10px; padding: 8px; border: 1.5px dashed var(--border); }
    .q-chip { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; }
    .q-chip.up { background: var(--up-color); }
    .q-chip.down { background: var(--down-color); }
    .q-chip.left { background: var(--left-color); }
    .q-chip.right { background: var(--right-color); }
    .q-chip.current-step { outline: 3px solid #FF6B35; transform: scale(1.1); }

    .btn-exec { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--success-color); color: #fff; font-family: 'Fredoka One', cursive; font-size: 20px; cursor: pointer; box-shadow: 0 6px 0 #1A7A42; margin-top: 10px; }
    .btn-exec:active { transform: translateY(4px); box-shadow: 0 2px 0 #1A7A42; }
    .btn-exec:disabled { background: #ccc; box-shadow: 0 4px 0 #999; cursor: not-allowed; }

    .status-bar { border-radius: 12px; padding: 10px; font-family: 'Fredoka One', cursive; text-align: center; background: #F4F4F4; border: 2px solid var(--border); margin-bottom: 10px; }
    .status-bar.success { background: #E8FBF0; color: var(--success-color); border-color: var(--success-color); }
    .status-bar.error { background: #FFE8E8; color: var(--error-color); border-color: var(--error-color); }

    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 100; overflow: hidden; }
    .confetti-piece { position: absolute; top: -10px; width: 10px; height: 14px; animation: fall linear forwards; }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    .hidden { display: none; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <span class="brand-robot">🤖</span>
    <div class="brand-text">
      <div class="brand-title">Mostrabot</div>
      <div class="brand-sub">Kit EJR · Primeiros Passos</div>
    </div>
  </div>
  <div class="header-step">Passo <b id="step-num">—</b></div>
</header>

<div class="confetti-wrap" id="confetti-wrap"></div>

<main class="app-main">
  <section class="grid-section">
    <div class="target-display">
      <span>🎯 Destino:</span>
      <span class="target-val" id="target-letter">?</span>
      <button class="btn-random" onclick="setRandomTarget()">🎲 Sortear</button>
    </div>
    <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  </section>

  <section class="controls-section">
    <div class="status-bar" id="status-bar">Escolha o destino e programe! 🚀</div>

    <div class="panel">
      <div class="panel-title">🧩 Blocos de Comando</div>
      <div class="cmd-grid">
        <button class="cmd-btn up" onclick="addCmd('up')">⬆️ Frente</button>
        <button class="cmd-btn left" onclick="addCmd('left')">⬅️ Esq</button>
        <button class="cmd-btn right" onclick="addCmd('right')">➡️ Dir</button>
        <button class="cmd-btn down" onclick="addCmd('down')">⬇️ Trás</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Sequência</div>
      <div class="queue-area" id="queue"></div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button style="flex:1; padding:8px;" onclick="undoCmd()">↩ Desfazer</button>
        <button style="flex:1; padding:8px;" onclick="clearCmds()">🗑 Limpar</button>
      </div>
    </div>

    <button class="btn-exec" id="btn-exec" onclick="executeCommands()">▶ Executar</button>
    <button style="width:100%; margin-top:10px; padding:8px;" onclick="resetAll()">🔄 Reiniciar Tudo</button>
  </section>
</main>

<script>
// --- SONS (WEB AUDIO API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, duration, vol = 0.1) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

const sounds = {
  step: () => playTone(400, 'square', 0.1),
  success: () => {
    playTone(523, 'sine', 0.2); 
    setTimeout(() => playTone(659, 'sine', 0.2), 150);
    setTimeout(() => playTone(783, 'sine', 0.4), 300);
  },
  error: () => {
    playTone(220, 'sawtooth', 0.3);
    setTimeout(() => playTone(110, 'sawtooth', 0.4), 100);
  }
};

// --- LÓGICA DO JOGO ---
const COLS = 6, ROWS = 6;
const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
const DIRS = {
  up: { dr: -1, dc: 0, arrow: '⬆' },
  down: { dr: 1, dc: 0, arrow: '⬇' },
  left: { dr: 0, dc: -1, arrow: '⬅' },
  right: { dr: 0, dc: 1, arrow: '➡' }
};

let robot = { row: 0, col: 0 };
let target = null;
let commands = [];
let executing = false;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CHARS.forEach((ch, idx) => {
    const row = Math.floor(idx / COLS);
    const col = idx % COLS;
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.id = `cell-${row}-${col}`;
    cell.textContent = ch;
    cell.onclick = () => setTarget(row, col);
    grid.appendChild(cell);
  });
}

function setTarget(row, col) {
  if (executing) return;
  target = { row, col };
  document.getElementById('target-letter').textContent = CHARS[row * COLS + col];
  render();
}

function setRandomTarget() {
  let r, c;
  do { r = Math.floor(Math.random()*6); c = Math.floor(Math.random()*6); }
  while(r === robot.row && c === robot.col);
  setTarget(r, c);
}

function addCmd(dir) {
  if (executing || commands.length >= 24) return;
  commands.push(dir);
  render();
}

function undoCmd() { if(!executing) { commands.pop(); render(); } }
function clearCmds() { if(!executing) { commands = []; render(); } }

function render() {
  // Grid
  document.querySelectorAll('.cell').forEach((el, idx) => {
    const r = Math.floor(idx/6), c = idx%6;
    el.className = 'cell';
    if(r === robot.row && c === robot.col) {
      el.classList.add(target && r===target.row && c===target.col ? 'robot-on-target' : 'robot-cell');
      el.textContent = '🤖';
    } else {
      if(target && r===target.row && c===target.col) el.classList.add('target-cell');
      el.textContent = CHARS[idx];
    }
  });
  // Queue
  const qArea = document.getElementById('queue');
  qArea.innerHTML = commands.length ? '' : '<small>Vazio</small>';
  commands.forEach((cmd, i) => {
    const chip = document.createElement('div');
    chip.className = 'q-chip ' + cmd;
    chip.id = `step-${i}`;
    chip.textContent = DIRS[cmd].arrow;
    qArea.appendChild(chip);
  });
}

async function executeCommands() {
  if (executing || !target || !commands.length) return;
  executing = true;
  document.getElementById('btn-exec').disabled = true;
  
  for (let i = 0; i < commands.length; i++) {
    document.getElementById(`step-${i}`).classList.add('current-step');
    document.getElementById('step-num').textContent = i + 1;
    
    const d = DIRS[commands[i]];
    const nR = robot.row + d.dr;
    const nC = robot.col + d.dc;

    await new Promise(r => setTimeout(r, 400));

    if (nR < 0 || nR >= 6 || nC < 0 || nC >= 6) {
      sounds.error();
      setStatus('error', '💥 Bateu na parede!');
      break;
    }

    robot.row = nR;
    robot.col = nC;
    sounds.step();
    render();
    document.getElementById(`step-${i}`).classList.remove('current-step');
  }

  if (robot.row === target.row && robot.col === target.col) {
    sounds.success();
    setStatus('success', '🎉 Alvo atingido!');
    launchConfetti();
  } else {
    sounds.error();
    setStatus('error', '❌ Tente de novo!');
  }
  
  executing = false;
  document.getElementById('btn-exec').disabled = false;
}

function setStatus(type, txt) {
  const s = document.getElementById('status-bar');
  s.className = 'status-bar ' + type;
  s.textContent = txt;
}

function resetAll() {
  robot = {row:0, col:0}; target = null; commands = [];
  document.getElementById('target-letter').textContent = '?';
  document.getElementById('step-num').textContent = '—';
  setStatus('', 'Escolha o destino e programe!');
  render();
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  for (let i=0; i<30; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.backgroundColor = ['#3A8FE8','#27AE60','#F5C842'][Math.floor(Math.random()*3)];
    p.style.animationDuration = (Math.random()*2+1)+'s';
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

buildGrid();
render();
</script>
</body>
</html>
